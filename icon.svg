<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142035"/>
      <stop offset="1" stop-color="#06080d"/>
    </linearGradient>
    <linearGradient id="btc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="0.45" stop-color="#f7931a"/>
      <stop offset="1" stop-color="#c96f00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- fundo arredondado -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="rgba(247,147,26,0.35)" stroke-width="4"/>

  <!-- brilho radial atrás do símbolo -->
  <circle cx="256" cy="256" r="170" fill="rgba(247,147,26,0.12)"/>

  <!-- símbolo ₿ desenhado como vetor (não depende de fonte) -->
  <g filter="url(#glow)" fill="url(#btc)">
    <!-- haste vertical superior e inferior -->
    <rect x="214" y="120" width="34" height="48" rx="10"/>
    <rect x="268" y="120" width="34" height="48" rx="10"/>
    <rect x="214" y="344" width="34" height="48" rx="10"/>
    <rect x="268" y="344" width="34" height="48" rx="10"/>
    <!-- corpo do B -->
    <path d="M168 150
             h126
             a78 78 0 0 1 18 154
             a82 82 0 0 1 -18 162
             h-126
             v-46
             h28
             v-224
             h-28
             z
             M252 196
             h44
             a32 32 0 0 1 0 64
             h-44
             z
             M252 286
             h52
             a34 34 0 0 1 0 68
             h-52
             z"
          fill-rule="evenodd"/>
  </g>
</svg>

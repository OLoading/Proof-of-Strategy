<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142035"/>
      <stop offset="1" stop-color="#06080d"/>
    </linearGradient>
    <linearGradient id="btc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="0.45" stop-color="#f7931a"/>
      <stop offset="1" stop-color="#c96f00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- fundo arredondado -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="rgba(247,147,26,0.35)" stroke-width="4"/>

  <!-- brilho radial atrás do símbolo -->
  <circle cx="256" cy="256" r="172" fill="rgba(247,147,26,0.12)"/>

  <!-- símbolo ₿ (glyph tipográfico, renderizado limpo pela fonte do sistema) -->
  <text x="256" y="262"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI Symbol','Apple Symbols','Noto Sans Symbols 2','Arial',system-ui,sans-serif"
        font-weight="700" font-size="330"
        fill="url(#btc)" filter="url(#glow)">&#8383;</text>
</svg>
